# Wonderland Wire — news sources for the agent.
# Each entry: { name, url } where url is an RSS/Atom feed.
# Add or remove freely; the agent picks up changes on its next scheduled run.
# Fetched server-side (no CORS), so paywalled sites still expose only what their feed allows.

