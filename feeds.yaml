# Wonderland Wire — news sources for the agent.
# Each feed carries two independent tags:
#   region ∈ Global, US, Europe, MENA, India, Southeast Asia, North Asia, ANZ, LatAm
#   kind   ∈ press  (news outlets, e.g. TechCrunch, Inc42)
#          | gp     (writing published by a VC firm / investor, e.g. a16z, Sapphire)
# kind defaults to "press" when omitted. Fetched server-side (no CORS);
# dead or RSS-less feeds are skipped automatically each run.

feeds:
  # ── Global ──
  - name: TechCrunch
    url: https://techcrunch.com/feed/
    region: Global
  - name: Crunchbase News
    url: https://news.crunchbase.com/feed/
    region: Global
