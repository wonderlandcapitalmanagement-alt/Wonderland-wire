name: Wonderland Wire

# Runs the news + podcast agents on a schedule and commits the refreshed JSON.
on:
  schedule:
    - cron: "0 */3 * * *"     # every 3 hours (UTC). GitHub cron is best-effort and may skip slots under load.
  workflow_dispatch: {}         # lets you run it on demand from the Actions tab

permissions:
  contents: write               # needed to commit the refreshed feeds back to the repo

# Never let two runs overlap — prevents the non-fast-forward push races.
concurrency:
  group: wonderland-wire
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the news agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python aggregator.py

      - name: Run the podcast agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python podcasts.py

      - name: Commit refreshed feeds
        run: |
          git config user.name  "wonderland-bot"
          git config user.email "bot@users.noreply.github.com"
          git add news.json _seen.json podcasts.json _seen_pods.json _feedstatus.json _podstatus.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "wire: refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then echo "pushed on attempt $i"; exit 0; fi
            echo "push $i rejected; reconciling (generated files: keep fresh output)..."
            git fetch origin main
            git merge -s ours origin/main -m "wire: reconcile (keep fresh feeds)" || true
            sleep 4
          done
          echo "::error::could not push after retries"
          exit 1
